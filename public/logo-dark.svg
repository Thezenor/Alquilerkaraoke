<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif" role="img" aria-label="Alquiler Karaoke">
  <defs>
    <linearGradient id="cy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FF4FB"/>
      <stop offset="42%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0792AB"/>
    </linearGradient>
    <linearGradient id="cySoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5EE7F2"/>
      <stop offset="100%" stop-color="#0BAFC7"/>
    </linearGradient>
  </defs>

  <!-- MICROPHONE -->
  <g transform="translate(150 170) rotate(-18)">
    <rect x="-26" y="10" width="52" height="150" rx="24" fill="#1b2128"/>
    <rect x="-26" y="10" width="20" height="150" rx="12" fill="#2c343d"/>
    <rect x="-44" y="-8" width="88" height="34" rx="17" fill="url(#cySoft)"/>
    <rect x="-58" y="-150" width="116" height="150" rx="58" fill="url(#cy)"/>
    <g stroke="#0A6E80" stroke-width="5" stroke-linecap="round" opacity="0.55">
      <line x1="-44" y1="-118" x2="44" y2="-118"/>
      <line x1="-50" y1="-92" x2="50" y2="-92"/>
      <line x1="-50" y1="-66" x2="50" y2="-66"/>
      <line x1="-44" y1="-40" x2="44" y2="-40"/>
    </g>
    <g stroke="#0A6E80" stroke-width="5" stroke-linecap="round" opacity="0.4">
      <line x1="-30" y1="-150" x2="-30" y2="-12"/>
      <line x1="0" y1="-150" x2="0" y2="-12"/>
      <line x1="30" y1="-150" x2="30" y2="-12"/>
    </g>
    <ellipse cx="-22" cy="-110" rx="14" ry="34" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- sound arcs -->
  <g fill="none" stroke="url(#cySoft)" stroke-width="9" stroke-linecap="round" opacity="0.9">
    <path d="M250 120 q34 50 0 100"/>
    <path d="M278 95 q60 75 0 150" opacity="0.55"/>
  </g>

  <!-- WORDMARK -->
  <text x="345" y="158" font-size="118" font-weight="900" letter-spacing="-3" fill="#11151B">Alquiler</text>
  <text x="348" y="262" font-size="86" font-weight="900" letter-spacing="14" fill="url(#cy)">KARAOKE</text>
</svg>
